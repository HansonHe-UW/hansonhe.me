    <style>
        /* ===== Reset & Base ===== */
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            color: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1.25rem;
            overflow-x: hidden;
        }

        /* ===== Container ===== */
        .container {
            position: relative;
            z-index: 1;
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.75rem;
            animation: fade-in 0.8s ease-out;
        }

        @keyframes fade-in {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Avatar ===== */
        .avatar-ring {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            padding: 3px;
            background: linear-gradient(135deg, #4f46e5, #818cf8, #4f46e5);
            background-size: 200% 200%;
            animation: ring-glow 4s ease-in-out infinite alternate;
        }

        @keyframes ring-glow {
            0% {
                background-position: 0% 50%;
            }

            100% {
                background-position: 100% 50%;
            }
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #ffffff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: 700;
            color: #4f46e5;
            letter-spacing: -0.02em;
        }

        /* ===== Identity ===== */
        .identity {
            text-align: center;
        }

        .name {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.02em;
            margin-bottom: 0.35rem;
        }

        .name .accent {
            color: #4f46e5;
        }

        .tagline {
            font-size: 0.85rem;
            color: #6b7280;
            line-height: 1.5;
        }

        /* ===== Links ===== */
        .links {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .link-card {
            display: flex;
            align-items: center;
            gap: 0.85rem;
            padding: 0.9rem 1.25rem;
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            transition: all 0.3s cubic-bezier(0.25, 0.1, 0.25, 1);
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .link-card:hover {
            border-color: #a5b4fc;
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(99, 102, 241, 0.12);
        }

        .link-card:active {
            transform: translateY(-1px);
        }

        .link-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
            color: #4f46e5;
            position: relative;
            z-index: 1;
        }

        .link-info {
            flex: 1;
            position: relative;
            z-index: 1;
        }

        .link-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.1rem;
        }

        .link-subtitle {
            font-size: 0.75rem;
            color: #9ca3af;
        }

        .link-arrow {
            width: 16px;
            height: 16px;
            color: #d1d5db;
            transition: all 0.3s ease;
            position: relative;
            z-index: 1;
        }

        .link-card:hover .link-arrow {
            color: #4f46e5;
            transform: translateX(3px);
        }

        /* ===== Staggered Animation ===== */
        .link-card {
            animation: slide-up 0.5s ease-out backwards;
        }

        .link-card:nth-child(1) {
            animation-delay: 0.1s;
        }

        .link-card:nth-child(2) {
            animation-delay: 0.18s;
        }

        .link-card:nth-child(3) {
            animation-delay: 0.26s;
        }

        .link-card:nth-child(4) {
            animation-delay: 0.34s;
        }

        .link-card:nth-child(5) {
            animation-delay: 0.42s;
        }

        .link-card:nth-child(6) {
            animation-delay: 0.50s;
        }

        .link-card:nth-child(7) {
            animation-delay: 0.58s;
        }

        @keyframes slide-up {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* ===== Footer ===== */
        .footer {
            font-size: 0.7rem;
            color: #9ca3af;
            letter-spacing: 0.03em;
            margin-top: 0.5rem;
        }

        /* ===== Contact Expandable ===== */
        .contact-chevron {
            transition: transform 0.3s ease;
        }

        .contact-toggle.expanded .contact-chevron {
            transform: rotate(180deg);
        }

        .contact-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.35s ease, opacity 0.3s ease;
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 0.4rem;
            width: 100%;
        }

        .contact-panel.open {
            max-height: 200px;
            opacity: 1;
        }

        .contact-item {
            display: flex;
            align-items: center;
            gap: 0.7rem;
            padding: 0.65rem 1.25rem 0.65rem 2.5rem;
            font-size: 0.82rem;
            color: #4b5563;
            border-radius: 10px;
            transition: all 0.2s ease;
            background: #f9fafb;
            border: 1px solid #f3f4f6;
        }

        .contact-item:hover {
            color: #4f46e5;
            background: #eef2ff;
            border-color: #c7d2fe;
        }

        .contact-item svg {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            color: #9ca3af;
        }

        .contact-item:hover svg {
            color: #4f46e5;
        }
    </style>
</head>
